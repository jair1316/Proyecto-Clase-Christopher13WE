    <article class="container contacto">
        <form action="#" method="" class="form">
            <section class="row">
                <section class="col-xs-12 col-sm-6 col-md-6">
                    <img src="img/contacto.jpg" alt="" class="img-fluid">
                </section>
                <section class="col-xs-12 col-sm-6 col-md-6">
                    <label for="">Nombre</label>
                    <input type="text" class="input" placeholder="Ingrese su nombre" required>
                    <!-- requeried es para que el campo sea obligatorio -->
                    <label for="">Correo</label>
                    <input type="email" class="input" placeholder="Ingrese su correo" required>

                    <label for="">Celular</label>
                    <input type="tel" class="input" placeholder="Ingrese su celular" required>

                    <textarea name="" id="" placeholder="Ingrese un mensaje" class="caja"></textarea>

                    <input type="submit" value="Registrar" class="botonContacto">
                </section>
            </section>

        </form>
    </article>
